title: obsidian-second-brain
description: >-
  A 31-command Claude Code skill that turns any Obsidian vault into a living
  AI-first second brain. Vault management, thinking tools, scheduled agents,
  and a research toolkit pulling live X posts, web research, and YouTube
  transcripts directly into structured vault notes.
theme: jekyll-theme-cayman
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO
url: https://eugeniughelbur.github.io
baseurl: /obsidian-second-brain
twitter:
  username: eugeniughelbur
  card: summary_large_image
social:
  name: Eugeniu Ghelbur
  links:
    - https://github.com/eugeniughelbur
    - https://www.linkedin.com/in/eugeniu-ghelbur/

# Don't ship internal docs as pages
exclude:
  - .venv
  - __pycache__
  - scripts
  - .env*
  - install.sh
  - pyproject.toml
  - uv.lock
  - .gitignore
  - CITATION.cff
  - SKILL.md
  - architecture.md
  - llms.txt
  - hooks
  - commands
  - references
